services:
  db:
    image: postgres:15
    container_name: parcerias_ufpa
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: PARCERIAS_UFPA_DB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - parcerias-ufpa-dev-networks

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: parcerias_ufpa_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: "parcerias_ufpa@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "parceriasufpa2026!"
    ports:
      - "6060:80"
    depends_on:
      - db
    networks:
      - parcerias-ufpa-dev-networks

  flyway:
    image: flyway/flyway:11
    container_name: parcerias-ufpa-flyway
    command: -configFiles=/flyway/conf/flyway.config -locations=filesystem:/flyway/sql -connectRetries=60 -baselineOnMigrate=true -X migrate
    volumes:
      - ./migrations/versions:/flyway/sql
      - ./migrations/flyway.config:/flyway/conf/flyway.config
    depends_on:
      - db
    networks:
      - parcerias-ufpa-dev-networks

  api:
    build: .
    container_name: parcerias_ufpa_api
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/PARCERIAS_UFPA_DB
    depends_on:
      - db
    networks:
      - parcerias-ufpa-dev-networks

networks:
  parcerias-ufpa-dev-networks:
    driver: bridge

volumes:
  postgres_data: